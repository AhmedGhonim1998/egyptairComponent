<button class="sidebar-toggle" (click)="toggleSidebar()" aria-label="Toggle sidebar">
  <i class="fas" [ngClass]="isOpen ? 'fa-times' : 'fa-bars'"></i>
</button>

<aside class="dynamic-sidebar" [class.open]="isOpen">
  <div class="sidebar-inner">
    <!-- Removed internal toggle button -->
    <!-- Brand -->
    <div class="sidebar-brand">
      <img src="images/egyptair-logo.png" alt="EgyptAir" class="sidebar-logo" />
    </div>

    <!-- User info (visible only when open) -->
    <div class="user-info" *ngIf="isOpen">
      <img src="https://randomuser.me/api/portraits/men/44.jpg" alt="User" class="user-avatar" />
      <div class="user-details">
        <h4>Ahmed Mahmoud</h4>
        <p>Frequent Flyer</p>
      </div>
    </div>

    <!-- Navigation menu -->
    <ul class="sidebar-nav">
      <li class="nav-item" *ngFor="let item of menuItems">
        <a routerLinkActive="active" class="nav-link" (click)="closeMobileMenu()">
          <i [class]="item.icon"></i>
          <span *ngIf="isOpen">{{ item.title }}</span>
        </a>
      </li>
    </ul>

    <!-- Sidebar footer -->
    <div class="sidebar-footer">
      <div class="stats-card" *ngIf="isOpen">
        <div class="stats-icon"><i class="fas fa-star"></i></div>
        <div class="stats-info">
          <h5>Loyalty Points</h5>
          <p>12,450</p>
        </div>
      </div>
      <a href="#" class="logout-link">
        <i class="fas fa-sign-out-alt"></i>
        <span *ngIf="isOpen">Logout</span>
      </a>
    </div>
  </div>
</aside>
